name: Update Harrogate Town RSS Feed

on:
  schedule:
    # Winter (GMT, UTC+0) — uncomment these, comment out BST below
    - cron: "0 15 * * *"
    - cron: "30 17 * * *"
    - cron: "0 20 * * *"
    - cron: "30 22 * * *"

    # Summer (BST, UTC+1) — uncomment these, comment out GMT above
    # - cron: "0 14 * * *"
    # - cron: "30 16 * * *"
    # - cron: "0 19 * * *"
    # - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate RSS
        run: python generate_rss.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml
          git diff --cached --quiet || git commit -m "chore: update RSS feed [skip ci]"
          git push
  
